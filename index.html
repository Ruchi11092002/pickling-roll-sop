<h1>SOP – Pickling Roll Change</h1>

<h2>Steps</h2>
<ol>
<li>Remove coupling / carden shaft</li>
<li>Loosen O/S liner bolts</li>
<li>Remove old roll using C hook</li>
<li>Install new roll</li>
<li>Fix carden shaft</li>
<li>Tighten liner bolts</li>
</ol>

</body>
